              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#e74c3c", "font": {"color": "white"}, "id": "D002", "label": "Nivolumab", "shape": "dot", "size": 30, "title": "\u003cb\u003eNivolumab\u003c/b\u003e\u003cbr\u003ePD-1 inhibitor\u003cbr\u003eMonoclonal Antibody"}, {"color": "#2ecc71", "font": {"color": "white"}, "id": "D006", "label": "Semaglutide", "shape": "dot", "size": 30, "title": "\u003cb\u003eSemaglutide\u003c/b\u003e\u003cbr\u003eGLP-1 agonist\u003cbr\u003ePeptide"}, {"color": "#9b59b6", "font": {"color": "white"}, "id": "D010", "label": "Lecanemab", "shape": "dot", "size": 30, "title": "\u003cb\u003eLecanemab\u003c/b\u003e\u003cbr\u003eAmyloid-beta Ab\u003cbr\u003eMonoclonal Antibody"}, {"color": "#e74c3c", "font": {"color": "white"}, "id": "D001", "label": "Pembrolizumab", "shape": "dot", "size": 30, "title": "\u003cb\u003ePembrolizumab\u003c/b\u003e\u003cbr\u003ePD-1 inhibitor\u003cbr\u003eMonoclonal Antibody"}, {"color": "#f39c12", "font": {"color": "white"}, "id": "D005", "label": "Imatinib", "shape": "dot", "size": 30, "title": "\u003cb\u003eImatinib\u003c/b\u003e\u003cbr\u003eBCR-ABL inhibitor\u003cbr\u003eSmall Molecule"}, {"color": "#9b59b6", "font": {"color": "white"}, "id": "D009", "label": "Aducanumab", "shape": "dot", "size": 30, "title": "\u003cb\u003eAducanumab\u003c/b\u003e\u003cbr\u003eAmyloid-beta Ab\u003cbr\u003eMonoclonal Antibody"}, {"color": "#c0392b", "font": {"color": "white"}, "id": "D003", "label": "Atezolizumab", "shape": "dot", "size": 30, "title": "\u003cb\u003eAtezolizumab\u003c/b\u003e\u003cbr\u003ePD-L1 inhibitor\u003cbr\u003eMonoclonal Antibody"}, {"color": "#27ae60", "font": {"color": "white"}, "id": "D007", "label": "Tirzepatide", "shape": "dot", "size": 30, "title": "\u003cb\u003eTirzepatide\u003c/b\u003e\u003cbr\u003eGIP/GLP-1 agonist\u003cbr\u003ePeptide"}, {"color": "#e67e22", "font": {"color": "white"}, "id": "D004", "label": "Trastuzumab", "shape": "dot", "size": 30, "title": "\u003cb\u003eTrastuzumab\u003c/b\u003e\                   nodeColors = {};

                  for (nodeId in allNodes) {
                    nodeColors[nodeId] = allNodes[nodeId].color;

                  allEdges = edges.get({ returnType: "Object" });
                  // adding nodes and edges to the graph
                  data = {nodes: nodes, edges: edges};

                  var options = {"physics": {"forceAtlas2Based": {"gravitationalConstant": -100, "centralGravity": 0.005, "springLength": 250, "springConstant": 0.05, "damping": 0.4}, "solver": "forceAtlas2Based", "stabilization": {"iterations": 150}}, "nodes": {"borderWidth": 2, "shadow": true}, "edges": {"shadow": true, "smooth": {"type": "curvedCW", "roundness": 0.15}}, "interaction": {"hover": true, "tooltipDelay": 100}};

                  


                  

                  network = new vis.Network(container, data, options);

                  

                  

                  


                  

                  return network;

              }
